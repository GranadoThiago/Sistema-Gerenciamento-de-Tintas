<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <title>Gerenciamento de Tintas</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; }
        form { background: #f5f5f5; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 8px; margin: 5px 0; box-sizing: border-box; }
        button { background: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; margin: 2px; }
        button:hover { background: #45a049; }
        .btn-secondary { background: #2196F3; }
        .btn-danger { background: #f44336; }
        .btn-warning { background: #ff9800; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #f2f2f2; }
        .section { margin-bottom: 20px; }
        h2 { color: #333; }
        #pesquisa { border: 2px solid #ddd; border-radius: 4px; font-size: 16px; width: 70%; padding: 10px; }
        #pesquisa:focus { border-color: #4CAF50; outline: none; }
        .topbar {
            display: flex; justify-content: space-between; align-items: center;
            background: #333; color: white; padding: 10px 20px; border-radius: 8px; margin-bottom: 20px;
        }
        .topbar span { font-size: 14px; }
        .topbar .actions button { margin-left: 8px; }
    </style>
</head>
<body>
    <div class="topbar">
        <span id="usuarioInfo">Carregando...</span>
        <div class="actions">
            <a id="linkUsuarios" href="/usuarios.html" style="display:none;">
                <button type="button" class="btn-secondary">👤 Usuários</button>
            </a>
            <button type="button" class="btn-danger" onclick="sair()">Sair</button>
        </div>
    </div>

    <h1>🖌️ Sistema de Manipulação de Tintas</h1>

    <form id="manipulacaoForm">
        <h2>Dados do Cliente</h2>
        <input type="text" id="cliente" placeholder="Nome do Cliente" required>
        <input type="text" id="produtoCliente" placeholder="Produto" required>
        <input type="text" id="endereco" placeholder="Endereço" required>
        <input type="date" id="dataManipulacao" required>

        <h2>Detalhes da Manipulação</h2>
        <input type="text" id="grupo" placeholder="Grupo">
        <input type="text" id="nomeCor" placeholder="Nome da Cor (Código)">
        <input type="text" id="produtoManip" placeholder="Produto">
        <input type="text" id="embalagem" placeholder="Embalagem">
        <input type="text" id="baseUsada" placeholder="Base Usada">
        <input type="number" id="quantidade" placeholder="Quantidade" step="1" required>

        <h2>Observações</h2>
        <textarea id="observacao" placeholder="Observações"></textarea>

        <div>
            <button type="submit">💾 Salvar</button>
            <button type="button" class="btn-secondary" onclick="limparForm()">🆕 Novo</button>
        </div>
    </form>

    <div class="section">
        <input type="text" id="pesquisa" placeholder="🔍 Pesquisar Cliente, Cor, Data ou Grupo..." onkeyup="pesquisarDados()">
        <button class="btn-warning" onclick="limparPesquisa()">Limpar</button>
    </div>

    <div class="section">
        <button onclick="exportarCSVFormatado()">📊 CSV</button>
        <button onclick="exportarExcel()">📈 Excel</button>
        <button onclick="exportarPDF()">📄 PDF</button>
        <button class="btn-secondary" onclick="verificarDados()">ℹ️ Total Registros</button>
    </div>

    <table id="tabelaManipulacoes">
        <thead>
            <tr>
                <th>Cliente</th><th>Data</th><th>Cor</th><th>Qtd</th><th>Ações</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        let todosOsDados = [];
        let editId = null;

        // ---------- Autenticação ----------
        async function verificarSessao() {
            try {
                const resp = await fetch('/api/auth/me');
                if (!resp.ok) {
                    window.location.href = '/login.html';
                    return;
                }
                const user = await resp.json();
                document.getElementById('usuarioInfo').textContent =
                    `👋 ${user.nome} (${user.role === 'admin' ? 'administrador' : 'usuário'})`;
                if (user.role === 'admin') {
                    document.getElementById('linkUsuarios').style.display = 'inline-block';
                }
                carregarTabela();
            } catch (err) {
                window.location.href = '/login.html';
            }
        }

        async function sair() {
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.href = '/login.html';
        }

        // ---------- Mapeamento de campos (client camelCase <-> API snake_case) ----------
        function paraPayload() {
            return {
                cliente: document.getElementById('cliente').value,
                produtoCliente: document.getElementById('produtoCliente').value,
                endereco: document.getElementById('endereco').value,
                dataManipulacao: document.getElementById('dataManipulacao').value,
                grupo: document.getElementById('grupo').value,
                nomeCor: document.getElementById('nomeCor').value,
                produtoManip: document.getElementById('produtoManip').value,
                embalagem: document.getElementById('embalagem').value,
                baseUsada: document.getElementById('baseUsada').value,
                quantidade: parseFloat(document.getElementById('quantidade').value),
                observacao: document.getElementById('observacao').value
            };
        }

        function doRegistro(r) {
            // Normaliza um registro vindo da API (colunas snake_case) para o formato usado na tela
            return {
                id: r.id,
                cliente: r.cliente,
                produtoCliente: r.produto_cliente,
                endereco: r.endereco,
                dataManipulacao: r.data_manipulacao,
                grupo: r.grupo,
                nomeCor: r.nome_cor,
                produtoManip: r.produto_manip,
                embalagem: r.embalagem,
                baseUsada: r.base_usada,
                quantidade: r.quantidade,
                observacao: r.observacao
            };
        }

        // ---------- CRUD ----------
        document.getElementById('manipulacaoForm').onsubmit = async (e) => {
            e.preventDefault();
            const payload = paraPayload();
            const url = editId ? `/api/manipulacoes/${editId}` : '/api/manipulacoes';
            const method = editId ? 'PUT' : 'POST';

            const resp = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!resp.ok) {
                const data = await resp.json().catch(() => ({}));
                alert(data.erro || 'Erro ao salvar');
                return;
            }

            limparForm();
            editId = null;
            carregarTabela();
        };

        function limparForm() {
            document.getElementById('manipulacaoForm').reset();
            editId = null;
        }

        async function editarManipulacao(id) {
            const resp = await fetch(`/api/manipulacoes/${id}`);
            if (!resp.ok) return;
            const r = doRegistro(await resp.json());
            Object.keys(r).forEach(key => {
                const el = document.getElementById(key);
                if (el) el.value = r[key] ?? '';
            });
            editId = id;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function excluirManipulacao(id) {
            if (!confirm('Confirmar exclusão?')) return;
            await fetch(`/api/manipulacoes/${id}`, { method: 'DELETE' });
            carregarTabela();
        }

        // ---------- Tabela e Pesquisa ----------
        async function carregarTabela(filtro = '') {
            const url = filtro ? `/api/manipulacoes?q=${encodeURIComponent(filtro)}` : '/api/manipulacoes';
            const resp = await fetch(url);
            if (!resp.ok) return;
            const dados = (await resp.json()).map(doRegistro);
            todosOsDados = dados;

            const tbody = document.querySelector('#tabelaManipulacoes tbody');
            tbody.innerHTML = '';
            dados.forEach(manip => criarLinhaTabela(manip));
        }

        let timeoutPesquisa;
        function pesquisarDados() {
            clearTimeout(timeoutPesquisa);
            const termo = document.getElementById('pesquisa').value;
            timeoutPesquisa = setTimeout(() => carregarTabela(termo), 250);
        }

        function limparPesquisa() {
            document.getElementById('pesquisa').value = '';
            carregarTabela();
        }

        function criarLinhaTabela(manip) {
            const tbody = document.querySelector('#tabelaManipulacoes tbody');
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${manip.cliente || ''}</td>
                <td>${formatarDataBR(manip.dataManipulacao)}</td>
                <td>${manip.nomeCor || '-'}</td>
                <td>${manip.quantidade ?? ''}</td>
                <td>
                    <button class="btn-secondary" onclick="mostrarDetalhes(${manip.id})">Detalhes</button>
                    <button class="btn-secondary" onclick="editarManipulacao(${manip.id})">Editar</button>
                    <button class="btn-danger" onclick="excluirManipulacao(${manip.id})">Excluir</button>
                </td>
            `;
            tbody.appendChild(tr);
        }

        async function mostrarDetalhes(id) {
            const resp = await fetch(`/api/manipulacoes/${id}`);
            if (!resp.ok) return;
            const d = doRegistro(await resp.json());

            const texto =
                `Cliente: ${d.cliente}\n` +
                `Produto (cliente): ${d.produtoCliente}\n` +
                `Endereço: ${d.endereco}\n` +
                `Data: ${d.dataManipulacao}\n\n` +
                `Grupo: ${d.grupo}\n` +
                `Nome da cor: ${d.nomeCor}\n` +
                `Produto (manipulação): ${d.produtoManip}\n` +
                `Embalagem: ${d.embalagem}\n` +
                `Base usada: ${d.baseUsada}\n` +
                `Quantidade: ${d.quantidade}\n\n` +
                `Observação:\n${d.observacao || ''}`;

            alert(texto);
        }

        // ---------- Exportações ----------
        function paraLinhaExport(r) {
            return {
                Cliente: r.cliente, Produto: r.produtoCliente, Endereço: r.endereco,
                Data: r.dataManipulacao, Grupo: r.grupo || '', 'Nome da Cor': r.nomeCor,
                Embalagem: r.embalagem || '', 'Base Usada': r.baseUsada || '',
                Quantidade: r.quantidade, Observação: r.observacao || ''
            };
        }

        function exportarCSVFormatado() {
            const dados = todosOsDados.map(paraLinhaExport);
            const csv = [
                ['RELATÓRIO DE MANIPULAÇÕES DE TINTAS', '', `Gerado: ${new Date().toLocaleDateString('pt-BR')}`],
                ['', '', `Total: ${dados.length} registros`],
                Object.keys(dados[0] || {}),
                ...dados.map(d => Object.values(d))
            ].map(row => row.map(field => `"${String(field ?? '').replace(/"/g, '""')}"`).join(',')).join('\n');

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `manipulacoes-tintas_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        }

        function exportarExcel() {
            const dados = todosOsDados.map(paraLinhaExport);
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.json_to_sheet(dados);
            ws['!cols'] = [{wch:20},{wch:15},{wch:25},{wch:12},{wch:12},{wch:18},{wch:12},{wch:12},{wch:10},{wch:30}];
            XLSX.utils.book_append_sheet(wb, ws, 'Manipulações');
            XLSX.writeFile(wb, `manipulacoes-tintas_${new Date().toISOString().split('T')[0]}.xlsx`);
        }

        function exportarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(20);
            doc.text('Relatório de Manipulações de Tintas', 20, 20);
            doc.setFontSize(12);
            doc.text(`Gerado: ${new Date().toLocaleDateString('pt-BR')}`, 20, 35);

            let y = 50;
            doc.setFontSize(10);
            doc.text('Cliente | Data | Cor | Qtd | Endereço | Observação', 20, y);
            y += 10;

            todosOsDados.forEach((manip) => {
                if (y > 270) { doc.addPage(); y = 20; }
                const linha = `${(manip.cliente||'').substring(0,15)} | ${manip.dataManipulacao||''} | ${manip.nomeCor||''} | ${manip.quantidade??''} | ${(manip.endereco||'').substring(0,20)} | ${(manip.observacao||'').substring(0,25)}`;
                doc.text(linha, 20, y);
                y += 7;
            });
            doc.save('manipulacoes-tintas.pdf');
        }

        function verificarDados() {
            alert(`📊 Total de registros: ${todosOsDados.length}`);
        }

        function formatarDataBR(iso) {
            if (!iso) return '';
            const dataStr = String(iso).split('T')[0];
            const [ano, mes, dia] = dataStr.split('-');
            if (!ano || !mes || !dia) return iso;
            return `${dia}/${mes}/${ano}`;
        }

        verificarSessao();
    </script>
</body>
</html>
