<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Usuários</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; }
        form { background: #f5f5f5; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        input, select { width: 100%; padding: 8px; margin: 5px 0; box-sizing: border-box; }
        button { background: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; margin: 2px; }
        button:hover { background: #45a049; }
        .btn-secondary { background: #2196F3; }
        .btn-danger { background: #f44336; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #f2f2f2; }
        .topbar {
            display: flex; justify-content: space-between; align-items: center;
            background: #333; color: white; padding: 10px 20px; border-radius: 8px; margin-bottom: 20px;
        }
        a { color: #2196F3; text-decoration: none; }
        #msg { min-height: 20px; margin-top: 8px; font-size: 14px; }
        #msg.erro { color: #f44336; }
        #msg.sucesso { color: #4CAF50; }
    </style>
</head>
<body>
    <div class="topbar">
        <a href="/index.html">← Voltar para o sistema</a>
        <button class="btn-danger" onclick="sair()">Sair</button>
    </div>

    <h1>👤 Gestão de Usuários</h1>

    <form id="usuarioForm">
        <h2 id="formTitulo">Novo Usuário</h2>
        <input type="hidden" id="editandoId">
        <input type="text" id="nome" placeholder="Nome completo" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="senha" placeholder="Senha (deixe em branco para não alterar, ao editar)">
        <select id="role">
            <option value="comum">Usuário comum</option>
            <option value="admin">Administrador</option>
        </select>
        <div>
            <button type="submit">💾 Salvar</button>
            <button type="button" class="btn-secondary" onclick="limparForm()">🆕 Novo</button>
        </div>
        <div id="msg"></div>
    </form>

    <table id="tabelaUsuarios">
        <thead>
            <tr><th>Nome</th><th>Email</th><th>Permissão</th><th>Ações</th></tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        let usuarioAtualId = null;

        async function verificarSessao() {
            const resp = await fetch('/api/auth/me');
            if (!resp.ok) { window.location.href = '/login.html'; return; }
            const user = await resp.json();
            if (user.role !== 'admin') { window.location.href = '/index.html'; return; }
            usuarioAtualId = user.id;
            carregarUsuarios();
        }

        async function sair() {
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.href = '/login.html';
        }

        function mostrarMsg(texto, tipo) {
            const el = document.getElementById('msg');
            el.textContent = texto;
            el.className = tipo;
            setTimeout(() => { el.textContent = ''; el.className = ''; }, 4000);
        }

        document.getElementById('usuarioForm').onsubmit = async (e) => {
            e.preventDefault();
            const editandoId = document.getElementById('editandoId').value;
            const payload = {
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                senha: document.getElementById('senha').value,
                role: document.getElementById('role').value
            };

            let resp;
            if (editandoId) {
                if (!payload.senha) delete payload.senha;
                resp = await fetch(`/api/users/${editandoId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } else {
                if (!payload.senha) {
                    mostrarMsg('Senha é obrigatória para novo usuário', 'erro');
                    return;
                }
                resp = await fetch('/api/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            }

            const data = await resp.json();
            if (!resp.ok) {
                mostrarMsg(data.erro || 'Erro ao salvar usuário', 'erro');
                return;
            }

            mostrarMsg('Usuário salvo com sucesso!', 'sucesso');
            limparForm();
            carregarUsuarios();
        };

        function limparForm() {
            document.getElementById('usuarioForm').reset();
            document.getElementById('editandoId').value = '';
            document.getElementById('formTitulo').textContent = 'Novo Usuário';
        }

        function editarUsuario(id, nome, email, role) {
            document.getElementById('editandoId').value = id;
            document.getElementById('nome').value = nome;
            document.getElementById('email').value = email;
            document.getElementById('role').value = role;
            document.getElementById('senha').value = '';
            document.getElementById('formTitulo').textContent = `Editando: ${nome}`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function excluirUsuario(id) {
            if (String(id) === String(usuarioAtualId)) {
                alert('Você não pode excluir sua própria conta.');
                return;
            }
            if (!confirm('Confirmar exclusão deste usuário?')) return;
            const resp = await fetch(`/api/users/${id}`, { method: 'DELETE' });
            if (!resp.ok) {
                const data = await resp.json().catch(() => ({}));
                alert(data.erro || 'Erro ao excluir');
                return;
            }
            carregarUsuarios();
        }

        async function carregarUsuarios() {
            const resp = await fetch('/api/users');
            if (!resp.ok) return;
            const usuarios = await resp.json();
            const tbody = document.querySelector('#tabelaUsuarios tbody');
            tbody.innerHTML = '';
            usuarios.forEach(u => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${u.nome}</td>
                    <td>${u.email}</td>
                    <td>${u.role === 'admin' ? 'Administrador' : 'Usuário comum'}</td>
                    <td>
                        <button class="btn-secondary" onclick='editarUsuario(${u.id}, ${JSON.stringify(u.nome)}, ${JSON.stringify(u.email)}, ${JSON.stringify(u.role)})'>Editar</button>
                        <button class="btn-danger" onclick="excluirUsuario(${u.id})">Excluir</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        verificarSessao();
    </script>
</body>
</html>
